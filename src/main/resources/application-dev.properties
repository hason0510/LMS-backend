spring.application.name=backend

spring.datasource.url=${DATASOURCE_URL_LOCAL}
spring.datasource.username=${DATASOURCE_USERNAME_LOCAL}
spring.datasource.password=${DATASOURCE_PASSWORD_LOCAL}
frontend.url=${FRONTEND_URL_LOCAL}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=${PORT:8081}

# benchmark user seeding on startup
benchmark.seed-users-on-startup=${BENCHMARK_SEED_USERS_ON_STARTUP:false}
benchmark.startup-users-count=${BENCHMARK_STARTUP_USERS_COUNT:1000000}
benchmark.startup-batch-size=${BENCHMARK_STARTUP_BATCH_SIZE:5000}


