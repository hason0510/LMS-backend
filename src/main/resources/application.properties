spring.application.name=backend

#spring.datasource.url=jdbc:mysql://localhost:3306/LMS
#spring.datasource.username=root
#spring.datasource.password=123456

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
hayson.jwt.base64-secret=${JWT_BASE64_SECRET}
hayson.jwt.access-token-validity-in-seconds=8640
hayson.jwt.refresh-token-validity-in-seconds=864000
hayson.jwt.refresh-cookie-secure=${JWT_REFRESH_COOKIE_SECURE:false}
hayson.jwt.refresh-cookie-same-site=${JWT_REFRESH_COOKIE_SAME_SITE:Lax}

# GOOGLE OAUTH2 CONFIGURATION
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_REDIRECT_URI}

# CLOUDINARY
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

#Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL}
spring.mail.password=${GMAIL_PASSCODE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.org.springframework.security=DEBUG
logging.level.com.example.backend=DEBUG
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Default profile to be active
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${PORT:8081}
spring.devtools.restart.enabled=false
# Scheduler: nhiều luồng để các @Scheduled job không chặn nhau (vd cùng nổ tại phút :00)
spring.task.scheduling.pool.size=2
# redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
# Redis chỉ dùng làm cache (không có Redis repository) -> tắt quét Redis-repo để bỏ INFO log gây nhiễu
spring.data.redis.repositories.enabled=false
#spring.main.web-application-type=none

# spring cache (applies to all @Cacheable/@CachePut/@CacheEvict caches)
spring.cache.type=redis
spring.cache.redis.time-to-live=${SPRING_CACHE_REDIS_TTL:5m}
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true
spring.cache.redis.key-prefix=${SPRING_CACHE_REDIS_KEY_PREFIX:lms:cache:}
